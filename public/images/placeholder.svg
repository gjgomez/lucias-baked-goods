<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5d5cf"/>
  <!-- Cake stand plate -->
  <ellipse cx="200" cy="240" rx="110" ry="14" fill="#e8a598"/>
  <rect x="90" y="220" width="220" height="20" rx="10" fill="#e8a598"/>
  <!-- Cake stand pedestal -->
  <rect x="185" y="200" width="30" height="35" rx="5" fill="#c97f70"/>
  <!-- Cake body -->
  <rect x="110" y="120" width="180" height="100" rx="12" fill="#fdf8f2"/>
  <!-- Cake layers -->
  <rect x="110" y="163" width="180" height="3" rx="2" fill="#e8a598" opacity="0.5"/>
  <!-- Frosting top -->
  <ellipse cx="200" cy="120" rx="90" ry="16" fill="#ffffff"/>
  <!-- Frosting drips -->
  <path d="M130 120 Q125 138 128 145" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <path d="M155 116 Q148 135 151 143" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <path d="M250 116 Q258 135 255 143" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <path d="M270 120 Q276 138 273 145" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <!-- Decorative dots on cake -->
  <circle cx="160" cy="150" r="4" fill="#e8a598"/>
  <circle cx="200" cy="155" r="4" fill="#e8a598"/>
  <circle cx="240" cy="150" r="4" fill="#e8a598"/>
  <!-- Cherry on top -->
  <circle cx="200" cy="104" r="10" fill="#c97f70"/>
  <path d="M200 94 Q210 80 220 75" stroke="#8fa38b" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="220" cy="74" r="3" fill="#8fa38b"/>
  <!-- Stars/sparkles -->
  <text x="80" y="80" font-size="20" fill="#e8a598" opacity="0.6">✦</text>
  <text x="300" y="70" font-size="16" fill="#c97f70" opacity="0.5">✦</text>
  <text x="320" y="180" font-size="12" fill="#8fa38b" opacity="0.4">✦</text>
  <text x="60" y="200" font-size="14" fill="#e8a598" opacity="0.4">✦</text>
</svg>
